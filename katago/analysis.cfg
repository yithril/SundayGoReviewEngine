# KataGo Analysis Config
# Used with: katago analysis -config analysis.cfg -model model.bin.gz
#
# This config is shared by both the GPU (CUDA) production build and the
# CPU (Eigen) local-test build.  CUDA-specific keys like cudaDeviceToUse
# are silently ignored by the Eigen build.

# Both keys are required by katago analysis mode:
# numAnalysisThreads — parallel queries handled at once (1 is correct for a single-job worker)
# numSearchThreads   — search threads used inside each query
numAnalysisThreads = 1
numSearchThreads = 8

# CUDA GPU device (0 = first GPU, always correct on RunPod; ignored by Eigen)
cudaDeviceToUse = 0

# Neural net cache — controls how many positions are cached in GPU memory
# 20 = 2^20 = ~1M positions. Increase on GPUs with more VRAM.
nnCacheSizePowerOfTwo = 20
nnMutexPoolSizePowerOfTwo = 17

# Max batch size for neural net evaluations
nnMaxBatchSize = 64

# Always report win rates from Black's perspective
reportAnalysisWinratesAs = BLACK
